{% extends "base.html" %}
{% block title %}Inicio{% endblock %}

{% block content %}
<div class="home-grid">

  <a href="/consultar" class="home-card">
    <div class="home-card-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="30" height="30" rx="3" stroke="currentColor" stroke-width="3" fill="none"/>
        <circle cx="46" cy="46" r="10" stroke="currentColor" stroke-width="3" fill="none"/>
        <line x1="53" y1="53" x2="60" y2="60" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="home-card-label">Consultar</span>
  </a>

  <div class="home-card home-card--disabled">
    <div class="home-card-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="12" y="8" width="40" height="48" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
        <line x1="20" y1="20" x2="44" y2="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="29" x2="44" y2="29" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="38" x2="36" y2="38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <polyline points="40,34 36,42 44,42" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <span class="home-card-label">Registrar Consumo</span>
  </div>

  <div class="home-card home-card--disabled">
    <div class="home-card-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="44" height="44" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
        <circle cx="32" cy="32" r="10" stroke="currentColor" stroke-width="3" fill="none"/>
        <line x1="32" y1="10" x2="32" y2="18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="32" y1="46" x2="32" y2="54" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="10" y1="32" x2="18" y2="32" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="46" y1="32" x2="54" y2="32" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="home-card-label">Administrar</span>
  </div>

  <div class="home-card home-card--disabled">
    <div class="home-card-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="20" stroke="currentColor" stroke-width="3" fill="none"/>
        <line x1="32" y1="20" x2="32" y2="32" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="32" y1="32" x2="42" y2="38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <circle cx="32" cy="32" r="2" fill="currentColor"/>
      </svg>
    </div>
    <span class="home-card-label">Tiempos Adicionales</span>
  </div>

  <a href="/mantenimiento" class="home-card">
    <div class="home-card-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M44 8 L56 20 L24 52 L12 40 Z" stroke="currentColor" stroke-width="3" fill="none" stroke-linejoin="round"/>
        <line x1="38" y1="14" x2="50" y2="26" stroke="currentColor" stroke-width="2.5"/>
        <line x1="8" y1="56" x2="12" y2="40" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <path d="M44 8 C44 8 50 4 56 8 C56 14 52 16 52 16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="home-card-label">Mantenimiento</span>
  </a>

</div>
{% endblock %}
